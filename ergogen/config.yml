meta:
  engine: 4.2.1

units:
  keycap_outline_pad: 2 
  mcu_outline_pad: 0.2

  # Config
  mcu_w: 17.78 # ProMicro width
  mcu_h: 33 # ProMicro height
  bat_w: 16 # Battery width
  bat_h: 41 # Battery height

  switch_dim: 14.2 # +.2 for 3D printing errors
  switchplate_d: 2.2 # 2.2mm thickness for Chocs

  screw_inserthole_r: 1.65
  screw_throughhole_r: 1.2
  screw_standoff_r: 3.1

points:
  key.tags: key
  key.padding: cy
  key.spread: cx
  zones:
    main:
      anchor:
        shift: [150, -150] # Fix KiCad placement
      columns:
        c0: # Outer
          rows.r4: $unset
          rows.r3: $unset
        c1: # Pinky
          key.stagger: 2
        c2: # Ring
          key.splay: -2
          key.spread: cx+.25
          key.stagger: 10
        c3: # Middle
          key.spread: cx+.25
          key.stagger: 4
        c4: # Index
          key.stagger: -4
        c5: # Inner
          key.stagger: -5
      rows:
        r1: # Bottom
        r2: # Home
        r3: # Above
        r4: # Nums
    thumb:
      anchor:
        ref: main_c5_r1
        shift: [-.9cx, -1.05cy]
      columns:
        c3: # Thumb-outer
          key.splay: -10
        c4: # Thumb-middle
          key.spread: 20
          key.splay: -9
          key.origin: [-12, -9]
        c5: # Thumb-inner
          key.spread: 20
          key.splay: -24
          key.origin: [-10, -8]
      rows:
        r0: # Thumb
    mcu:
      key.tags:
        - helper
      anchor:
        - ref: main_c5_r4
          shift: [mcu_w/2+cx/2 + 1.5, -mcu_h/2+cy/2 + .5]
    jst:
      key.tags:
        - helper
      anchor:
        - ref: main_c1_r4
          rotate: 270
          shift: [6, cy/2+5]
    battery:
      key.tags:
        - helper
      anchor:
        - ref: main_c0_r2
          shift: [-0.5, bat_h-cy/2]
    screw_1:
      key.tags: 
        - helper
        - screw
        - pcb_screw
      anchor:
        aggregate.parts:
          - ref: main_c2_r3
          - ref: main_c2_r4
          - ref: main_c1_r3
          - ref: main_c1_r4
        shift: [0, 17]
    screw_2:
      key.tags:
        - helper
        - screw
        - pcb_screw
      anchor:
        aggregate.parts:
          - ref: main_c5_r4
          - ref: main_c5_r3
          - ref: main_c4_r4
          - ref: main_c4_r3
        shift: [0,-2.5]
    screw_3:
      key.tags:
        - helper
        - screw
        - pcb_screw
      anchor:
        aggregate.parts:
          - ref: main_c0_r1
          - ref: main_c0_r2
          - ref: main_c1_r1
          - ref: main_c1_r2
        shift: [0, -3]
    screw_4:
      key.tags:
        - helper
        - screw
        - pcb_screw
      anchor:
        aggregate.parts:
          - ref: thumb_c4_r0
          - ref: thumb_c5_r0
          - ref: main_c5_r1
        shift: [9.5,2]
    screw_5:
      key.tags:
        - helper
        - screw
        - pcb_screw
      anchor:
        aggregate.parts:
          - ref: main_c4_r2
          - ref: main_c4_r1
          - ref: main_c3_r2
          - ref: main_c3_r1
        shift: [0,-3]
    screw_6:
      key.tags:
        - helper
        - screw
        - case_screw
      anchor:
        ref: mcu
        shift: [0, -23]
    screw_7: 
      key.tags:
        - helper
        - screw
        - case_screw
      anchor:
        ref: main_c1_r4
        shift: [-cx-7.5, cy-.8]

outlines:
  # Reference Pcb outline
  effiddy_pcb:
    - where: [key]
      what: rectangle
      size: [cx+1, cy+1]
    - where: [main_c4_r1]
      what: rectangle
      size: [cx+5, cy+5]
    - where: [mcu]
      what: rectangle
      size: [mcu_w, mcu_h]
    - where: [main_c1_r4] # Fill gap from splay (pinky|ring)
      what: rectangle
      size: [cx+5, (cy+1)*3]
      adjust.shift: [5/2,-(cy+1)]
    - where: [main_c1_r4]
      what: rectangle
      size: [cx+4, 15]
      adjust.shift: [1.5, 10]
    - what: polygon
      points:
        - ref: mcu # Mcu
          shift: [mcu_w/2+mcu_outline_pad, -70]
        - ref: mcu 
          shift: [mcu_w/2+mcu_outline_pad, mcu_h/2+mcu_outline_pad]
        - ref: mcu
          shift: [-mcu_w - 50, mcu_h/2+mcu_outline_pad]
        - ref: main_c4_r4 # Thumb cluster
        - ref: thumb_c3_r0
          shift: [-(cx+1)/2, (cy+1)/2]
        - ref: thumb_c3_r0
          shift: [-(cx+1)/2, -(cy+1)/2]
        - ref: thumb_c4_r0
          shift: [-(cx+1)/2, -(cy+1)/2]
        - ref: thumb_c5_r0
          shift: [-(cx+1)/2, -(cy+1)/2]
        - ref: thumb_c5_r0
          shift: [(cx+1)/2, (cy+1)/2]
        
  #
  # Pcb preview outlines
  #

  _pcb_keycaps:
    - where: [key]
      what: rectangle
      size: [cx-.5, cy-.5]
      fillet: 1
  _pcb_mcu:
    - where: [mcu]
      what: rectangle
      size: [mcu_w, mcu_h]
    - where: [mcu]
      what: rectangle
      size: [8.94, 7.35]
      operation: stack
      adjust.shift: [0, mcu_h/2-7.35/2+0.7]
  _pcb_jst:
    - where: [jst]
      what: rectangle
      size: [6.9, 12.35]
      adjust.shift: [0, -4.4]
  _pcb_battery:
    - where: [battery]
      what: rectangle
      size: [bat_w, bat_h]
  _pcb_screws:
    - where: [screw]
      what: circle
      radius: 4.3/2
  # Preview
  preview_assembly:
    - what: outline
      name: effiddy_pcb
    - what: outline
      name: _pcb_keycaps
      operation: stack
    - what: outline
      name: _pcb_mcu
      operation: stack
    - what: outline
      name: _pcb_screws
      operation: stack
    - what: outline
      name: _pcb_battery
      operation: stack
    - what: outline
      name: _pcb_jst
      operation: stack

  #
  # Case top outlines
  # 

  # Basic switchplate outline
  _case_plate: 
    - what: outline
      name: effiddy_pcb
    - where: [key]
      what: rectangle
      size: switch_dim
      operation: subtract
    - where: [thumb]
      what: rectangle
      size: switch_dim
      operation: subtract
    - where: [screw]
      what: circle
      radius: screw_throughhole_r
      operation: subtract
    - where: [jst]
      what: rectangle
      size: [10,20]
      adjust.shift: [-1,-8]
      operation: subtract
    - where: [mcu]
      what: rectangle
      size: [mcu_w, mcu_h]
      operation: subtract
    - what: rectangle # Mask to remove floater
      where: [mcu]
      size: [20, 40]
      adjust.shift: [(20-mcu_w)/2, 0]
      operation: subtract
  # Basic case mask, base for outline
  _case_mask:
    - what: outline
      name: effiddy_pcb
    - where: main_c0_r2 # Space for bat
      what: rectangle
      size: [cx+2, (cy+2)*3]
      adjust.shift: [.5, 25]
    - where: main_c1_r1 # Cover below ring/middle cols
      what: rectangle
      size: [(cx+2)*4, cy+2]
      adjust.shift: [20, .5]
  # Case wall mask: Serves as a subtraction shape for the wall
  _case_wall_mask:
    - what: outline
      name: _case_mask
      expand: .2>
  # Case outline; Case shape when viewed from the top
  _case_outline: 
    - what: outline
      name: _case_mask
      expand: 2.2>
  # Case wall: case outline minus case wall mask
  _case_wall:
    - what: outline
      name: _case_outline
    - what: outline
      name: _case_wall_mask
      operation: subtract
  # Case wall hug: same as wall, but no gap to PCB
  _case_wall_hug:
    - what: outline
      name: _case_outline
    - what: outline
      name: _case_mask
      operation: subtract
  # Cutout to make space for key matrix
  _case_key_mask:
    - where: [key]
      what: rectangle
      size: [cx+1, cy+1]
    - where: [main_c1_r4] # Fill gap from splay (pinky|ring)
      what: rectangle
      size: [cx+2, cy*3.4]
      adjust.shift: [2,-1.17*cy]
  # Case outline with cutout for keys
  _case_outline_keyless:
    - what: outline
      name: _case_outline
    - what: outline
      name: _case_key_mask
      operation: subtract
  # Case boxes: The "boxes" for containing Bat + Mcu
  _case_boxes:
    - what: outline
      name: _case_outline_keyless
    - where: main_c3_r4 # Above ring, middle, index
      what: rectangle
      size: [cx*4+1.000001+.25,13]
      adjust.shift: [cx/2-.25/2, 5]
      operation: subtract
    - where: main_c1_r4 # Little nibble above pinky (above JST)
      what: rectangle
      size: [10,10]
      adjust.shift: [10,24.7]
      operation: subtract
    - where: main_c0_r1 # Bottom left edges
      what: rectangle
      size: [cx*3+1, cy*3+1]
      operation: subtract
    - where: thumb_c3_r0 # Left of outer thumb
      what: rectangle
      size: [cx+5.5, cy+20]
      operation: subtract # Middle thumb
    - where: thumb_c4_r0
      what: rectangle
      size: [cx+10.4, cy+7]
      operation: subtract
    - where: thumb_c5_r0
      what: rectangle
      size: [cx+10.5, cy+7]
      operation: subtract
    - where: main_c5_r1
      what: rectangle
      size: [cx+1, cy+8]
      operation: subtract
  # Case box negatives: Cutout for Mcu
  _case_boxes_negative_mcu:
    - where: [mcu]
      what: rectangle
      size: [mcu_w, mcu_h]
    - where: [mcu]
      what: rectangle
      size: [8.94, 7.35]
      adjust.shift: [0, mcu_h/2]
      expand: .5]
  # Case box negatives: Cutout for Bat + Jst
  _case_boxes_negative_bat_jst:
    - where: [jst]
      what: rectangle
      size: [7.5, 21]
      adjust.shift: [.25, -8.5]
    - what: outline
      name: _pcb_battery
  # Case box negatives: HSI standoff for Bat Box screw
  _case_boxes_screw_standoff_bat:
    - where: [screw_7]
      what: circle
      radius: screw_standoff_r
  # Case box negatives: HSI standoff hole for Bat Box screw 
  _case_boxes_screw_standoff_bat_hole:
    - where: [screw_7]
      what: circle
      radius: screw_inserthole_r
  # Case box negatives: HSI hole for screw 1
  _case_boxes_screw_standoff_mcu_hole:
    - where: [screw_6]
      what: circle
      radius: screw_inserthole_r
  # Case box patch for bottom
  _case_boxes_bottom_patch:
    - where: [thumb_c3_r0]
      what: rectangle
      size: [4,11]
      adjust.shift: [-cx/2-2, 6.8]
  # Case plate patch for screw 1, since it is unused
  _case_plate_screw_1_patch:
    - where: [screw_1]
      what: circle
      radius: screw_throughhole_r
  # Preview
  preview_case_top:
    - where: [key]
      what: rectangle
      size: [cx-.5, cy-.5] # https://keycapsss.com/KEA-Low-Profile-Keycaps-for-Choc-V1-3D-Printed-MX-Spaced/KC10244.10
      fillet: .5
      operation: stack
    - what: outline
      name: _case_wall_hug
      operation: stack
    - what: outline
      name: _case_boxes
      operation: stack
    - what: outline
      name: _case_boxes_negative_mcu
      operation: stack
    - what: outline
      name: _case_boxes_negative_bat_jst
      operation: stack
    - what: outline
      name: _case_boxes_screw_standoff_bat
      operation: stack
    - what: outline
      name: _case_boxes_screw_standoff_bat_hole
      operation: stack
    - what: outline
      name: _case_boxes_screw_standoff_mcu_hole
      operation: stack
    - what: outline
      name: _case_boxes_bottom_patch
      operation: stack
    - what: outline
      name: _case_plate_screw_1_patch
      operation: stack
    - where: [screw_7]
      what: circle
      radius: 2.2/2
      operation: stack


  #
  # Case bottom plate outlines
  #

  # Hotswap (right) socket
  _casebottom_hss_right_shape: 
    - what: rectangle # 14x7.2 measured outline
      size: [14, 3] # 7.2-5 = 2.2 + .7 pad
    - what: rectangle
      size: [14/2, 5]
      adjust.shift: [14/4,5/4]
    - what: rectangle
      size: [14/2, 5]
      adjust.shift: [-14/4,-5/4]
    - what: rectangle
      size: [5,5]
      adjust.shift: [-2.2, 5/2]
  # Hotswap (right) socket, relatively positioned
  _casebottom_hss_right_raw:
    - what: outline
      name: _casebottom_hss_right_shape
      adjust.shift: [2.5,-4.9] # Relative to key center
  # Hotswap (left) socket
  _casebottom_hss_left_shape: 
    - what: rectangle # 14x7.2 measured outline
      size: [14, 3] # 7.2-5 = 2.2 + .7 pad
    - what: rectangle
      size: [14/2, 5]
      adjust.shift: [14/4,-5/4]
    - what: rectangle
      size: [14/2, 5]
      adjust.shift: [-14/4,5/4]
    - what: rectangle
      size: [5,5]
      adjust.shift: [2.2, 5/2]
  # Hotswap (left) socket, relatively positioned
  _casebottom_hss_left_raw:
    - what: outline
      name: _casebottom_hss_left_shape
      adjust.shift: [-2.5,-4.9] # Relative to key center
  # Switch peg + diode, relatively positioned
  _casebottom_peg_diode_raw:
    - what: circle
      radius: 5.5/2
    - what: rectangle
      size: [5, 2.6]
      adjust.shift: [0, 3.3]
  # All switch component cutouts (right half)
  _casebottom_switch_components_right_cutout:
    - what: outline
      name: _casebottom_hss_right_raw
      fillet: 1
    - what: outline
      name: _casebottom_peg_diode_raw
      fillet: 1
  # All switch component cutouts (left half)
  _casebottom_switch_components_left_cutout:
    - what: outline
      name: _casebottom_hss_left_raw
      fillet: 1
    - what: outline
      name: _casebottom_peg_diode_raw
      fillet: 1
  # "Base plate" for the bat cage
  _casebottom_bat_cage_base:
    - where: [main_c0_r2]
      what: rectangle
      size: [18, 44.5]
      adjust.shift: [-.5, 31.25]
  # Battery cage
  _casebottom_bat_cage_cutouts:
    - where: [screw_7]
      what: circle
      radius: screw_throughhole_r
    - where: [main_c0_r2] # Cage cutout
      what: rectangle
      size: [16, 5]
      adjust.shift: [-1, 42]
    - where: [main_c0_r2]
      what: rectangle
      size: [16, 5]
      adjust.shift: [-1, 42-5-3]
    - where: [main_c0_r2]
      what: rectangle
      size: [16, 5]
      adjust.shift: [-1, 42-10-6]
    - where: [main_c0_r2]
      what: rectangle
      size: [16, 5]
      adjust.shift: [-1, 42-15-9]
  # Standoff post for bat cage screw
  _casebottom_bat_cage_screw_standoff:
    - where: [screw_7]
      what: circle
      radius: 2.5
    - where: [screw_7]
      what: circle
      radius: screw_throughhole_r
      operation: subtract
  # Power + Reset switch cutouts
  _casebottom_io_cutout:
    - where: [mcu] # Reset switch
      what: rectangle
      size: [7.5, 4.9]
      adjust.shift: [-25, mcu_h/2-2.05]
    - where: [mcu] # Power switch
      what: rectangle
      size: [8.7, 5.2]
      adjust.shift: [-15, mcu_h/2-2.2]
    - where: [mcu] # Power / Reset switch patch
      what: rectangle
      size: [3, 6]
      adjust.shift: [-20, mcu_h/2-2]
    - where: [mcu] # Actuator cutout
      what: rectangle
      size: [16.5, 3]
      adjust.shift: [-18.9, mcu_h/2+1]
  # Mcu pin solder recesses
  _casebottom_mcu_solder_recess:
    - where: [mcu]
      what: rectangle
      size: [3, mcu_h]
      adjust.shift: [-7.5, 0]
    - where: [mcu]
      what: rectangle
      size: [3, mcu_h]
      adjust.shift: [7.5, 0]
    - where: [mcu]
      what: rectangle
      size: [12.5, 13]
      adjust.shift: [0, 10]
  # Jst pin solder recesses
  _casebottom_jst_solder_recess:
    - where: [jst]
      what: rectangle
      size: [4.5, 5.5]
      adjust.shift: [0,-1]
  # Bottom base (pcb + bat cage) for footprint
  _casebottom_plate_footprint_base:
    - what: outline
      name: effiddy_pcb
    - what: outline
      name: _casebottom_bat_cage_base
  # Bottom footprint
  _casebottom_plate_footprint:
    - what: outline
      name: _casebottom_plate_footprint_base
      expand: 1.2>
  # Bottom plate base
  _casebottom_plate_base:
    - what: outline
      name: effiddy_pcb
      expand: .2>
  # Bottom plate wall
  _casebottom_wall:
    - what: outline
      name: _casebottom_plate_footprint
    - what: outline
      name: _casebottom_plate_base
      operation: subtract
  # Bottom cutouts (right half)
  _casebottom_right_cutouts:
    - where: [key]
      what: outline
      name: _casebottom_switch_components_right_cutout
    - what: outline
      name: _casebottom_bat_cage_cutouts
    - what: outline
      name: _casebottom_io_cutout
    - where: [pcb_screw] # PCB screw holes
      what: circle
      radius: screw_inserthole_r
    - where: [screw_6] # Mcu screw hole
      what: circle
      radius: screw_throughhole_r
  # Bottom cutouts (left half)
  _casebottom_left_cutouts:
    - where: [key]
      what: outline
      name: _casebottom_switch_components_left_cutout
    - what: outline
      name: _casebottom_bat_cage_cutouts
    - what: outline
      name: _casebottom_io_cutout
    - where: [pcb_screw] # PCB screw holes
      what: circle
      radius: screw_inserthole_r
    - where: [screw_6] # Mcu screw hole
      what: circle
      radius: screw_throughhole_r
  # All solder recesses
  _casebottom_solder_recesses:
    - what: outline 
      name: _casebottom_mcu_solder_recess
    - what: outline 
      name: _casebottom_jst_solder_recess
  # Preview
  preview_case_bottom:
    - what: outline
      name: _casebottom_right_cutouts
    - what: outline
      name: _casebottom_wall
      operation: stack
    - what: outline
      name: _casebottom_bat_cage_base
      operation: stack
    - what: outline
      name: _casebottom_bat_cage_screw_standoff
      operation: stack
    - what: outline 
      name: _casebottom_solder_recesses
      operation: stack
  # Preview
  preview_case_bottom_left:
    - what: outline
      name: _casebottom_left_cutouts
    - what: outline
      name: _casebottom_wall
      operation: stack
    - what: outline
      name: _casebottom_bat_cage_base
      operation: stack
    - what: outline
      name: _casebottom_bat_cage_screw_standoff
      operation: stack
    - what: outline 
      name: _casebottom_solder_recesses
      operation: stack
pcbs:
  effiddy:
    template: kicad8
    outlines:
      main:
        outline: effiddy_pcb
    footprints:
      gnd_zone:
        what: ceoloide/utility_filled_zone
        params:
          side: 'F&B'
          points: [[120,60],[300,60],[300,210],[120,210]]
          remove_islands: 'below_area_limit'
          min_island_size: 6
      keyswitches:
        where: [key]
        what: ceoloide/switch_choc_v1_v2
        params:
          from: "{{colrow}}"
          to: "{{col.name}}"
          hotswap: true
          choc_v1_support: true
          include_stabilizer_pad: false

          include_plated_holes: true
          include_centerhole_net: true

          hotswap_pads_same_side: false
          locked_traces_vias: true # Not movable
          outer_pad_width_front: 2
          outer_pad_width_back: 2
          reversible: true
        adjust.rotate: 180
      diodes:
        where: /key/
        what: ceoloide/diode_tht_sod123
        params:
          from: "{{colrow}}"
          to: "{{row}}"
          reversible: true
          include_traces_vias: true
        adjust:
          shift: [0, 3.5]
          rotate: 0
      mcu:
        what: ceoloide/mcu_supermini_nrf52840
        where: mcu
        params:
          reversible: true
          only_required_jumpers: true
          P10: "r0"
          P3: "r1"
          P4: "r2"
          P5: "r3"
          P2: "r4"
          P15: "c0"
          P18: "c1"
          P16: "c2"
          P8: "c3"
          P9: "c4"
          P19: "c5"
          P6: "DA"
          P7: "CL"
          P14: "CS"
          P20_label: " "
          P21_label: " "
          use_rectangular_jumpers: false
      battery_connector:
        what: ceoloide/battery_connector_jst_ph_2
        where: jst
        params:
          reversible: true
        adjust:
      on_off_switch:
        what: ceoloide/power_switch_smd_side
        where: mcu
        params:
          from: BAT_P
          to: RAW
          reversible: true
        adjust:
          shift: [-15, mcu_h/2-2]
          rotate: 90
      reset_switch:
        what: ceoloide/reset_switch_smd_side
        where: mcu
        params:
          reversible: true
          include_bosses: true
          include_silkscreen: true
          include_courtyard: true
        adjust.shift: [-25, mcu_h/2-2.5]
      screws:
        what: ceoloide/mounting_hole_npth
        where: /screw/
        params:
          hole_size: 3
          hole_drill: 2.2

cases:
  effiddy_case_top:
    - what: outline
      name: _case_boxes
      extrude: 7 + switchplate_d
    - what: outline
      name: _case_boxes_negative_bat_jst
      extrude: 6
      operation: subtract
    - what: outline
      name: _case_boxes_screw_standoff_bat
      extrude: 6 + switchplate_d

    - what: outline
      name: _case_wall_hug
      extrude: switchplate_d
    - what: outline
